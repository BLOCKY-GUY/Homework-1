<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Media Adventure Webpage</title>
</head>

<body>

    <header>
        <h1>Welcome to My Media Adventure</h1>
        <p>Exploring images, audio, video, and embedded projects!</p>
    </header>

    <main>
        <section>
            <h2>Adventure Gallery</h2>
            <img src="https://via.placeholder.com/300x200"
                alt="A scenic view of mountain peaks during a colorful sunrise">
            <img src="https://via.placeholder.com/300x200"
                alt="Close up photo of a lush green forest trail hidden in mist">
            <img src="https://via.placeholder.com/300x200"
                alt="An open ocean horizon underneath a clear blue afternoon sky">
        </section>

        <section>
            <h2>Background Adventure Music</h2>
            <audio controls loop>
                <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </section>

        <section>
            <h2>Featured Adventure Video</h2>
            <video controls poster="https://via.placeholder.com/640x360" loop width="640">
                <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </section>

        <section>
            <h2>Interactive Scratch Project</h2>
            <iframe src="https://scratch.mit.edu/projects/1012248/embed" allowtransparency="true" width="485"
                height="402" frameborder="0" scrolling="no" allowfullscreen></iframe>
        </section>
    </main>

</body>

</html>
