<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Cartoon Character Card</title>

    <style>
        /* Universal selector to apply a common style to all page elements */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Element selectors to style body, h1, h2, and p tags */
        body {
            background-color: #f0f4f8;
            font-family: 'Arial', sans-serif;
            padding: 40px;
            display: flex;
            justify-content: center;
        }

        h1 {
            color: #1a365d;
            font-size: 28px;
            text-align: center;
            margin-bottom: 20px;
        }

        h2 {
            color: #2b6cb0;
            font-size: 20px;
            margin-top: 10px;
        }

        p {
            color: #4a5568;
            font-size: 15px;
            line-height: 1.5;
        }

        /* Class selector to style a specific cartoon character card block wrapper */
        .character-card {
            background-color: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            max-width: 350px;
            padding: 20px;
            text-align: center;
        }

        .character-avatar {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background-color: #e2e8f0;
            margin: 0 auto 15px auto;
        }

        /* ID selector to style a specific unique section of a cartoon character card */
        #special-power-section {
            background-color: #feebc8;
            border: 1px solid #fbd38d;
            border-radius: 6px;
            margin-top: 15px;
            padding: 10px;
        }
    </style>
</head>

<body>

    <div class="character-card">
        <h1>SpongeBob SquarePants</h1>

        <div class="character-avatar">
            <img src="https://via.placeholder.com/150" alt="SpongeBob Avatar Logo" style="border-radius: 50%;">
        </div>

        <p style="color: #dd6b20; font-weight: bold; font-size: 18px;">Ocean Chef Extraordinaire</p>

        <h2>Character Bio</h2>
        <p>A friendly, optimistic yellow sponge who lives in a pineapple under the sea at Bikini Bottom and works
            happily at the Krusty Krab.</p>

        <div id="special-power-section">
            <h2>Signature Ability</h2>
            <p>High-speed culinary mastercrafting of delicious Krabby Patties!</p>
        </div>
    </div>

</body>

</html>
