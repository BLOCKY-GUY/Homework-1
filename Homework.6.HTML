<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaborate Registration Form</title>
</head>

<body>

    <header>
        <h1>Extended Student Registration Form</h1>
        <p>Please fill out the additional fields below to complete your profile.</p>
    </header>

    <main>
        <form action="/submit-registration" method="POST">
            <fieldset>
                <legend>Account Credentials</legend>
                <p>
                    <label for="username">Username:</label>
                    <input type="text" id="username" name="username" required>
                </p>
                <p>
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" required>
                </p>
                <p>
                    <label for="password">Password:</label>
                    <input type="password" id="password" name="password" required>
                </p>
            </fieldset>

            <fieldset>
                <legend>Personal Specifications</legend>
                <p>
                    <label for="birthdate">Date of Birth:</label>
                    <input type="date" id="birthdate" name="birthdate">
                </p>
                <p>
                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" min="5" max="100">
                </p>
                <p>
                    <label>Gender:</label>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Other</label>
                </p>
            </fieldset>

            <fieldset>
                <legend>Preferences & File Attachments</legend>
                <p>
                    <label for="course">Select Learning Course:</label>
                    <select id="course" name="course">
                        <option value="html-basics">HTML5 Fundamentals</option>
                        <option value="css-styles">Advanced CSS Styling</option>
                        <option value="js-programming">JavaScript Interactions</option>
                    </select>
                </p>
                <p>
                    <label for="profile-pic">Upload Profile Picture:</label>
                    <input type="file" id="profile-pic" name="profile-pic">
                </p>
                <p>
                    <input type="checkbox" id="newsletter" name="newsletter" checked>
                    <label for="newsletter">Subscribe to weekly coding updates</label>
                </p>
                <p>
                    <label for="bio">Short Biography/Comments:</label><br>
                    <textarea id="bio" name="bio" rows="4" cols="50" placeholder="Tell us about yourself..."></textarea>
                </p>
            </fieldset>

            <p>
                <button type="submit">Submit Registration</button>
                <button type="reset">Clear Form</button>
            </p>
        </form>
    </main>

</body>

</html>
